name: news_app_clean_architecture
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.16.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  #icon
  ionicons: ^0.1.2

  #state management
  flutter_bloc: ^8.1.2

  #comparing dart objects
  equatable: ^2.0.5

  #service locator
  get_it: ^7.6.0
  
  #dateFormat
  intl: ^0.18.1

  #Database
  floor: any

  #make request to api
  retrofit: ^3.0.1
  dio: ^4.0.6

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.3
  firebase_storage: ^11.5.5
  firebase_auth: ^4.16.0

  # File picker (web + native)
  file_picker: ^6.1.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Share via Web Share API
  share_plus: ^7.2.0


  #Hooks
  flutter_hooks: ^0.18.3

  #chached image 
  cached_network_image: ^3.3.1

  # Theme + splash persistence
  shared_preferences: ^2.2.0
  flutter_native_splash: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  retrofit_generator: 3.0.1+1
  floor_generator: 1.2.0
  build_runner: 2.1.2
  flutter_launcher_icons: ^0.12.0

flutter_icons:
  android: true
  ios: false
  image_path: "assets/sn_logo.png"
  web:
    generate: true
    image_path: "assets/sn_logo.png"
  

flutter:

  uses-material-design: true

  assets:
    - assets/logo.png

  fonts:
    - family: Muli
      fonts:
        - asset: assets/fonts/muli/Muli.ttf
        - asset: assets/fonts/muli/Muli-Bold.ttf
          weight: 700
        - asset: assets/fonts/muli/Muli-Light.ttf
          weight: 300
